# Configuration Nginx Production
server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;

    # Redirection automatique HTTP vers HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name votre-domaine.com www.votre-domaine.com;

    # Chemins vers les certificats SSL (gérés par Certbot)
    ssl_certificate /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;

    # Optimisations SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 1. Frontend Vue.js (Fichiers statiques buildés)
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html; # Important pour le Router Vue
    }

    # 2. API Django et Admin
    location ~ ^/(api|admin) {
        proxy_pass http://django:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Augmenter la taille max des fichiers (pour les dossiers clients)
        client_max_body_size 20M;
    }

    # 3. Fichiers Statiques de Django (Admin, CSS, JS)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # 4. Fichiers Médias (Dossiers clients / Uploads)
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}