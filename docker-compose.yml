services:
  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: django_app
    volumes:
      - ./project_management_backend:/project_management_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
    stdin_open: true
    tty: true

  vue:
    build:
      context: .
      dockerfile: Dockerfile.vue
    container_name: vue_app
    volumes:
      - ./project-management:/project-management
      - /project-management/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    stdin_open: true
    tty: true

  # Optionnel pour l'instant : on vire nginx tant que le reste ne marche pas