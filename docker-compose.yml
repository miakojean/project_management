services:
  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./project_management_backend:/project_management_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DATABASE_URL=sqlite:///db.sqlite3  # ou postgres plus tard
    depends_on:
      - vue

  vue:
    build:
      context: .
      dockerfile: Dockerfile.vue
    container_name: vue_app
    command: npm run dev
    volumes:
      - ./project-management:/project-management
      - /project-management/node_modules  # évite de réinstaller à chaque fois
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true  # important pour hot-reload dans Docker
      - VITE_BACKEND_URL=http://django:8000  # si tu fais du proxy

  # Bonus : proxy reverse pour accéder à tout via un seul port (recommandé)
  nginx:
    image: nginx:stable-alpine
    container_name: nginx_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - django
      - vue